# TAG-72 production prompt schema (extended by TAG-73).
#
# This is the runtime-enforced catalog of slugs that the loader (loader.py)
# warms at boot. It matches docs/prompts/_schema.yaml (the TAG-71 inventory)
# 1:1 after TAG-73 — every slug listed in the inventory has a .md file on
# disk and an entry below.
#
# Adding / removing a slug requires three coordinated edits (CI lints these):
#   1. The .md file under the matching path (slug -> path: dots become /).
#   2. An entry in the `slugs` list below.
#   3. A call site swap in the agent code from the inline constant to
#      get_prompt() / render_prompt().
#
# Schema entry fields:
#   slug              : full dotted slug (must match the frontmatter slug
#                        on disk and the file path)
#   placeholders      : list of {placeholder} tokens the body uses
#                        ([] = pure static prompt)
#   min_chars         : minimum body length AFTER frontmatter strip
#   max_chars         : maximum body length AFTER frontmatter strip
#   must_contain      : list of substrings required in the body (smoke
#                        checks; catch obviously corrupt files)
#   must_not_contain  : list of substrings forbidden in the body
#                        (secret prefixes etc.)

slugs:
  # ----- system prompts ---------------------------------------------------
  - slug: system.web_planner
    placeholders: []
    min_chars: 200
    max_chars: 8000
    must_contain:
      - "plan"
      - "tool"
    must_not_contain:
      - "sk-"
      - "csk-"
      - "tvly-"

  - slug: system.searcher
    placeholders: []
    min_chars: 100
    max_chars: 4000
    must_contain:
      - "grounding"
    must_not_contain:
      - "sk-"
      - "csk-"
      - "tvly-"

  - slug: system.rag_planner
    placeholders: []
    min_chars: 400
    max_chars: 8000
    must_contain:
      - "HARD RULES"
      - "citations"
    must_not_contain:
      - "sk-"
      - "csk-"
      - "tvly-"

  # ----- templates --------------------------------------------------------
