# =============================================================================
# OppMon - Docker Swarm Stack
# =============================================================================
# Deploy:
#   docker stack deploy --with-registry-auth -c docker-stack.yml oppmon
#
# Notes:
# - API runs on old_windows (manager), web runs on z800 (worker).
# - Database is external to the stack (host PostgreSQL at 192.168.1.195:5432),
#   reached via the host LAN IP from the API container.
# - Both images are pushed to Docker Hub:
#     - thachrocky/oppmon_api  (note underscore — historical naming)
#     - thachrocky/oppmon-web  (note hyphen — historical naming)
#   Bump the tag here whenever you push a new version so workers actually pull.
# =============================================================================

version: "3.8"

services:
  api:
    image: thachrocky/oppmon-api:v53809
    networks:
      - oppmon-net
    ports:
      - target: 3001
        published: 3001
        protocol: tcp
        # ingress so multiple replicas on old_windows can share :3001 via
        # swarm's routing mesh. mode: host would limit us to one replica.
        mode: ingress
    # Base config comes from apps/api/.env (loaded at deploy time on the
    # manager and embedded in the service spec). The `environment:` block
    # below overrides values that must differ in prod (LAN host IPs,
    # container volume paths, NODE_ENV, etc.). Compose precedence:
    # `environment:` wins over `env_file:`.
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      # Flip to "true" and redeploy when the Prisma schema changes; it's a
      # one-shot startup hook that runs `prisma db push --accept-data-loss`
      # before the API boots. Leave "false" otherwise.
      DB_AUTO_PUSH: "false"
      # RAG document storage root (matches the oppmon-documents volume mount;
      # apps/api/.env points at a relative dev path).
      TAG_DOCUMENT_ROOT: /app/data/documents
      # Prod LAN URLs — apps/api/.env points at localhost.
      PUBLIC_URL: http://192.168.1.195:3001
      CORS_ORIGIN: http://192.168.1.195,http://192.168.1.105
      FRONTEND_URL: http://192.168.1.105
      OLLAMA_BASE_URL: http://192.168.1.195:11434
    volumes:
      - oppmon-documents:/app/data/documents
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.hostname == old_windows
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        # start-first is safe now: ingress mode means replicas don't compete
        # for a host port. Maintains capacity during rolling updates.
        order: start-first
        failure_action: rollback

  web:
    image: thachrocky/oppmon-web:v53809
    networks:
      - oppmon-net
    ports:
      - target: 3000
        published: 80
        protocol: tcp
        # ingress for multiple replicas (see api notes above).
        mode: ingress
    # Shares the api env file so JWT_SECRET (and any other shared secret) has
    # ONE source of truth — apps/api/.env. Without this, rotating JWT_SECRET
    # on the api side would leave web verifying with a stale hardcoded value,
    # silently rejecting every cookie. The `environment:` block below only
    # holds web-specific or prod-override values; for any shared secret, edit
    # apps/api/.env and redeploy.
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      # Browser uses relative /api/* (so the UI works from any client network).
      # NEXT_PUBLIC_API_URL is intentionally empty.
      NEXT_PUBLIC_API_URL: ""
      # Server-side rewrite target (Next.js process inside the container hits this).
      INTERNAL_API_URL: http://192.168.1.195:3001
      # JWT_SECRET intentionally NOT set here — it comes from apps/api/.env via
      # env_file above, guaranteeing parity with services.api. Next.js edge
      # middleware (apps/web/src/middleware.ts:32) verifies cookies with it.
      # ----- Graph mode -----
      # graph-agent listens on container port 7002 (the standard contract;
      # 8002 conflicts with another local service on old_windows). Web reaches
      # it via Swarm overlay DNS.
      GRAPH_BACKEND_URL: http://graph-agent:7002
      GRAPH_BACKEND_TOKEN: ""
      # NOTE: NEXT_PUBLIC_GRAPH_ENABLED is build-time only — it must be passed
      # via --build-arg when building thachrocky/oppmon-web. Setting it here
      # has no effect on the already-built image.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.hostname == z800
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        order: start-first
        failure_action: rollback

  # ===========================================================================
  # Graph-mode agent - mindsearch v2 (FastAPI)
  # ===========================================================================
  # Serves POST /solve_v2 (SSE) for OppMon Chat's Graph mode. Source is in
  # apps/agent_graph_backend/ in this repo. See docs/solve-v2.md.
  #
  # Bump the image tag every push so swarm workers actually pull. Always use
  # a tag whose source actually exposes /solve_v2 — the legacy
  # `backend.<year>` tags pre-date that endpoint.
  graph-agent:
    image: thachrocky/mindsearch:backend.v2.53809
    networks:
      - oppmon-net
    # Graph-agent config is read at boot. The vars the v2 server reads:
    # LLM_PROVIDER, ANTHROPIC_API_KEY, ANTHROPIC_MODEL, OPENAI_API_KEY,
    # WEB_SEARCH_PROVIDER, TAVILY_API_KEY, TAVILY_SEARCH_TIMEOUT,
    # TAVILY_SEARCH_DEPTH, PLANNER_MAX_ITERATIONS, SEARCHER_MAX_ITERATIONS,
    # MINDSEARCH_DEBUG.
    #
    # TAG-65: the authenticated /solve route (TAG-50 epic) needs four
    # additional secrets — DATABASE_URL, JWT_SECRET, TAG_ENCRYPTION_MASTER_KEY,
    # OPENAI_EMBED_API_KEY — plus the embedding model/dim pair so the boot-
    # time dim guard agrees with the Express side. `mount_v2()` runs
    # `check_required_env()` at startup and CrashLoopBackOffs if any of
    # these are empty while ENABLE_SOLVE_V3=true.
    #
    # IMPORTANT: every `${VAR:-}` resolves from the SHELL that runs
    # `docker stack deploy`, not from any .env file. Source apps/api/.env
    # first:  `set -a && . apps/api/.env && set +a`. See
    # .claude/skills/swarm-debug/SKILL.md §solve-v3-check.
    environment:
      # v53809 image bug: v2_server.py does `from agent_v2.app import mount_v2`
      # which only resolves if /root/agent_search is on PYTHONPATH (CMD runs
      # from /root). Remove this when the image fixes the import to use the
      # full agent_search.agent_v2.app path.
      PYTHONPATH: /root/agent_search
      # Contract is :7002 inside the container. 8002 is already used by
      # another local service on old_windows — see deploy_ubuntu.md and the
      # prod-swarm-deploy skill. Image default is 7002, so leave MINDSEARCH_PORT
      # unset.
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Web search: Tavily primary, DDG fallback (built into the v2 image via
      # ChainedWebSearch in mindsearch.agent_v2.app._build_web_search).
      WEB_SEARCH_PROVIDER: ${WEB_SEARCH_PROVIDER:-tavily}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_SEARCH_TIMEOUT: ${TAVILY_SEARCH_TIMEOUT:-8}
      TAVILY_SEARCH_DEPTH: ${TAVILY_SEARCH_DEPTH:-basic}
      PLANNER_MAX_ITERATIONS: ${PLANNER_MAX_ITERATIONS:-10}
      SEARCHER_MAX_ITERATIONS: ${SEARCHER_MAX_ITERATIONS:-3}
      # ----- TAG-65: authenticated /solve route -----
      # MUST equal services.api.environment.JWT_SECRET (env_file: apps/api/.env).
      # Mismatch = every JWT rejected; verify with scripts/check-jwt-parity.sh.
      JWT_SECRET: ${JWT_SECRET:-}
      # MUST equal apps/api's TAG_ENCRYPTION_MASTER_KEY — ciphertext written
      # by Express decrypts here. Empty value triggers CrashLoopBackOff.
      TAG_ENCRYPTION_MASTER_KEY: ${TAG_ENCRYPTION_MASTER_KEY:-}
      # Rotation chain (oldest first). Optional; empty is fine.
      TAG_ENCRYPTION_LEGACY_KEYS: ${TAG_ENCRYPTION_LEGACY_KEYS:-}
      # Direct asyncpg URL — host LAN IP, NOT localhost.
      DATABASE_URL: ${DATABASE_URL:-}
      # Embed-side key (operator pool, NOT a per-user model).
      OPENAI_EMBED_API_KEY: ${OPENAI_EMBED_API_KEY:-}
      OPENAI_EMBED_API_BASE: ${OPENAI_EMBED_API_BASE:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      # Rollback knob: flip to "false" and redeploy to un-mount /solve
      # without removing code or rotating any secret.
      ENABLE_SOLVE_V3: ${ENABLE_SOLVE_V3:-true}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7002/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == old_windows
      restart_policy:
        condition: any
        delay: 5s

networks:
  oppmon-net:
    driver: overlay
    attachable: true

volumes:
  oppmon-documents:
    driver: local
