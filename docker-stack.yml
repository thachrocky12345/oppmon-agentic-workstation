# =============================================================================
# OppMon - Docker Swarm Stack
# =============================================================================
# Deploy:
#   docker stack deploy --with-registry-auth -c docker-stack.yml oppmon
#
# Notes:
# - API runs on old_windows (manager), web runs on z800 (worker).
# - Database is external to the stack (host PostgreSQL at 192.168.1.195:5432),
#   reached via the host LAN IP from the API container.
# - Both images are pushed to Docker Hub:
#     - thachrocky/oppmon_api  (note underscore — historical naming)
#     - thachrocky/oppmon-web  (note hyphen — historical naming)
#   Bump the tag here whenever you push a new version so workers actually pull.
# =============================================================================

version: "3.8"

services:
  api:
    image: thachrocky/oppmon-api:v72277
    networks:
      - oppmon-net
    ports:
      - target: 3001
        published: 3001
        protocol: tcp
        # ingress so multiple replicas on old_windows can share :3001 via
        # swarm's routing mesh. mode: host would limit us to one replica.
        mode: ingress
    environment:
      NODE_ENV: production
      PORT: "3001"
      LOG_LEVEL: info
      # Flip to "true" and redeploy when the Prisma schema changes; it's a
      # one-shot startup hook that runs `prisma db push --accept-data-loss`
      # before the API boots. Leave "false" otherwise.
      DB_AUTO_PUSH: "false"
      # RAG document storage root (matches the oppmon-documents volume mount).
      TAG_DOCUMENT_ROOT: /app/data/documents
      DATABASE_URL: postgres://thachbui:db4n89o3J824@192.168.1.195:5432/oppmon
      JWT_SECRET: development-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://192.168.1.195,http://192.168.1.105
      # LLM providers
      LLM_DEFAULT_PROVIDER: anthropic
      OLLAMA_BASE_URL: http://192.168.1.195:11434
      OLLAMA_MODEL: llama3.2
      OLLAMA_TIMEOUT: "120000"
      CEREBRAS_API_KEY: csk-4jrn3tphtc59vnep8xmeyn2ddp452e6p4vckn29kvmfd94rt
      CEREBRAS_MODEL: llama3.1-8b
      CEREBRAS_TIMEOUT: "60000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      ANTHROPIC_MODEL: claude-sonnet-4-20250514
      ANTHROPIC_TIMEOUT: "60000"
      # Embedding
      POC_SEARCH_EMBEDDING_PROVIDER: openai
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      OPENAI_EMBEDDING_DIMENSIONS: "1536"
      OPENAI_EMBEDDING_TIMEOUT: "60000"
      OPENAI_EMBEDDING_BATCH_SIZE: "2048"
      # RAG
      RAG_DEFAULT_TOP_K: "5"
      RAG_DEFAULT_THRESHOLD: "0.7"
      RAG_MAX_CONTEXT_TOKENS: "4000"
      RAG_STRATEGY: simple
      RAG_INCLUDE_SOURCES: "true"
      AUTO_EMBEDDING_ENABLED: "true"
      TAG_ENCRYPTION_MASTER_KEY: 2PSWveNizjoD0FcpaKjNh6mujpyYrV5uBdKFQUpHHgk=
    volumes:
      - oppmon-documents:/app/data/documents
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.hostname == old_windows
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        # start-first is safe now: ingress mode means replicas don't compete
        # for a host port. Maintains capacity during rolling updates.
        order: start-first
        failure_action: rollback

  web:
    image: thachrocky/oppmon-web:v5
    networks:
      - oppmon-net
    ports:
      - target: 3000
        published: 80
        protocol: tcp
        # ingress for multiple replicas (see api notes above).
        mode: ingress
    environment:
      NODE_ENV: production
      # Browser uses relative /api/* (so the UI works from any client network).
      # NEXT_PUBLIC_API_URL is intentionally empty.
      NEXT_PUBLIC_API_URL: ""
      # Server-side rewrite target (Next.js process inside the container hits this).
      INTERNAL_API_URL: http://192.168.1.195:3001
      # Must match the API's JWT_SECRET — Next.js edge middleware verifies the
      # cookie with this. If unset, the middleware silently falls back to a
      # non-matching default and rejects every JWT (see deploy-retro-2026-05-07.md
      # item C). Keep parity with `services.api.environment.JWT_SECRET`.
      JWT_SECRET: development-secret-key-change-in-production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.hostname == z800
      restart_policy:
        condition: any
        delay: 5s
      update_config:
        order: start-first
        failure_action: rollback

networks:
  oppmon-net:
    driver: overlay
    attachable: true

volumes:
  oppmon-documents:
    driver: local
