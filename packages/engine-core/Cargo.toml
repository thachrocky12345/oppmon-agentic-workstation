[workspace]
resolver = "2"
members = [
    "crates/common",
    "crates/napi",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Arkon Team"]
license = "MIT"
repository = "https://github.com/arkon/arkon-workstation"

[workspace.dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Hashing
sha2 = "0.10"
hex = "0.4"

# Time
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1.0", features = ["v4", "serde"] }

# Testing
tokio = { version = "1.0", features = ["full", "test-util"] }

# Workspace crates
arkon-common = { path = "crates/common" }
