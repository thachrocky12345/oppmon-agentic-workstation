name: Claude Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR: ${{ github.event.pull_request.number || github.event.issue.number }}

            Review for high-signal issues only:
            - Bugs (logic errors, null/undefined, off-by-one, race conditions)
            - Security (injection, hardcoded secrets, missing input validation, broken auth)
            - Performance regressions and unnecessary blocking work
            - Broken contracts with callers (renamed/removed exports without callsite updates)

            Skip nits, style, formatting, and personal-preference comments — Brynn handles those.
            If the PR adds external library calls, check the API is current (libraries
            move fast; method names get renamed). Flag any uses of plausibly-stale APIs.

            Use `mcp__github_inline_comment__create_inline_comment` for specific code issues.
            Use `gh pr comment` for a top-level summary at the end.
            Only post GitHub comments — don't submit review text as messages.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
