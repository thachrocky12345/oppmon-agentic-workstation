# =============================================================================
# Local test override — use the three pulled images instead of building.
# Usage:
#   docker compose --env-file apps/api/.env --profile prod --profile graph up -d
# =============================================================================
services:
  api:
    build: !reset null
    image: thachrocky/oppmon-api:v2.1
    # Image's published docker-entrypoint.sh has CRLF line endings, breaking
    # both the shebang and `set -e` parsing. Strip CRs then execute.
    entrypoint: ["sh", "-c", "tr -d '\\r' < /app/apps/api/docker-entrypoint.sh > /tmp/entry.sh && chmod +x /tmp/entry.sh && exec sh /tmp/entry.sh"]
    command: []
    environment:
      # docker-compose uses --env-file for substitution, but api also needs
      # DATABASE_URL pointing at the in-network db hostname.
      DATABASE_URL: postgres://oppmon:oppmon_dev_password@db:5432/oppmon
      JWT_SECRET: development-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3002
      FRONTEND_URL: http://localhost:3002
      GITHUB_REDIRECT_URI: http://localhost:3001/api/auth/github/callback
      NEXT_PUBLIC_API_URL: http://localhost:3001
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CEREBRAS_API_KEY: ${CEREBRAS_API_KEY:-}
      TAG_ENCRYPTION_MASTER_KEY: ${TAG_ENCRYPTION_MASTER_KEY:-}
      DB_AUTO_PUSH: "false"
      TAG_DOCUMENT_ROOT: /app/data/documents

  web:
    build: !reset null
    image: thachrocky/oppmon-web:webs.v3
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      GRAPH_BACKEND_URL: http://graph-agent:8002
      NEXT_PUBLIC_GRAPH_ENABLED: "true"
    ports:
      - "3002:3000"

  graph-agent:
    build: !reset null
    image: thachrocky/mindsearch:backend.v2.1
    env_file: !reset null
    environment:
      LLM_PROVIDER: anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WEB_SEARCH_PROVIDER: tavily
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      TAVILY_SEARCH_TIMEOUT: "8"
      TAVILY_SEARCH_DEPTH: basic
      PLANNER_MAX_ITERATIONS: "6"
      SEARCHER_MAX_ITERATIONS: "3"
    # NOTE: Source was renamed mindsearch/ -> agent_search/ on this branch,
    # so the prior bind mount is removed — use the baked module in the image.
    ports:
      - "7002:8002"
