# TAG-71 — Preliminary prompt-slug schema.
#
# This file is the machine-readable companion to docs/prompts/inventory.md.
# It is intentionally minimal: a flat list of slugs with their location
# and placeholders. TAG-72 will replace it with the canonical schema
# that ALSO carries frontmatter fields (version, status, owner, etc.).
#
# Read order: this file -> inventory.md (§ section number) -> the source
# file:line listed under `location`.
#
# Conventions:
#   slug         <kind>.<scope>.<name>[.<arg>]  (see inventory.md §1)
#   kind         one of: system | template | tool_description | tool_param
#   location     file:line[-end] relative to apps/agent_graph_backend/
#   placeholders list of {name} placeholders the body interpolates at runtime
#                ([] means no placeholders)
#   notes        optional free text — only for blockers / cross-refs

version: 0  # TAG-72 promotes to 1 when frontmatter contract is locked

