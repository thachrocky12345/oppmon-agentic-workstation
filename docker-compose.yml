# =============================================================================
# OppMon Workstation - Docker Compose
# =============================================================================
#
# Usage:
#   pnpm docker:up          # Start all services (db + api + web)
#   pnpm docker:db          # Start database only
#   pnpm docker:down        # Stop all services
#   pnpm docker:logs        # View logs
#
# Profiles:
#   --profile dev           # Development mode with hot reload
#   --profile prod          # Production mode with built images
#   --profile full          # All services including Redis
#   --profile graph         # KnowledgeSearchBackend (graph-mode agent /solve_v2)
#                           # See docs/solve-v2.md
#
# =============================================================================

services:
  # ===========================================================================
  # Database - PostgreSQL with TimescaleDB
  # ===========================================================================
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: oppmon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oppmon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oppmon_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-oppmon}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oppmon} -d ${POSTGRES_DB:-oppmon}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - oppmon-network

  # ===========================================================================
  # Redis - Caching and Session Store (optional)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: oppmon-redis
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - oppmon-network

  # ===========================================================================
  # Backend API - Express.js (Development)
  # ===========================================================================
  api-dev:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: oppmon-api-dev
    restart: unless-stopped
    profiles:
      - dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-oppmon}:${POSTGRES_PASSWORD:-oppmon_dev_password}@db:5432/${POSTGRES_DB:-oppmon}
      JWT_SECRET: ${JWT_SECRET:-development-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3002}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3001/api/auth/github/callback}
      # Redis (when using full profile)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro
      - /app/node_modules
      - /app/apps/api/node_modules
      - oppmon-documents:/app/data/documents
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - oppmon-network

  # ===========================================================================
  # Backend API - Express.js (Production)
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
    container_name: oppmon-api
    restart: unless-stopped
    profiles:
      - prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "3001:3001"
    volumes:
      - oppmon-documents:/app/data/documents
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - oppmon-network

  # ===========================================================================
  # Frontend - Next.js (Development)
  # ===========================================================================
  web-dev:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: oppmon-web-dev
    restart: unless-stopped
    profiles:
      - dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_TELEMETRY_DISABLED: 1
      # ----- Graph mode (optional) -----
      # GRAPH_BACKEND_URL: server-side proxy target for /api/graph/solve.
      # Unset = the Next.js proxy returns 503 and the toggle is hidden.
      # When the graph-agent profile is active, this points at the service
      # name on the overlay network.
      GRAPH_BACKEND_URL: ${GRAPH_BACKEND_URL:-}
      GRAPH_BACKEND_TOKEN: ${GRAPH_BACKEND_TOKEN:-}
      # Feature flag that controls whether the Graph toggle renders. Build-time
      # only — flip to "true" and rebuild the web image once the graph-agent
      # service is up.
      NEXT_PUBLIC_GRAPH_ENABLED: ${NEXT_PUBLIC_GRAPH_ENABLED:-false}
    ports:
      - "${FRONTEND_PORT:-3002}:3002"
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/web/public:/app/apps/web/public:ro
      - ./packages:/app/packages:ro
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api-dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - oppmon-network

  # ===========================================================================
  # Frontend - Next.js (Production)
  # ===========================================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # NEXT_PUBLIC_* must be baked in at build time, not runtime.
        NEXT_PUBLIC_GRAPH_ENABLED: ${NEXT_PUBLIC_GRAPH_ENABLED:-false}
    container_name: oppmon-web
    restart: unless-stopped
    profiles:
      - prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # See web-dev block for what these do.
      GRAPH_BACKEND_URL: ${GRAPH_BACKEND_URL:-}
      GRAPH_BACKEND_TOKEN: ${GRAPH_BACKEND_TOKEN:-}
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - oppmon-network

  # ===========================================================================
  # Graph-mode agent - KnowledgeSearchBackend (opt-in via --profile graph)
  # ===========================================================================
  # Serves POST /solve_v2 (SSE). Source lives at apps/KnowledgeSearchBackend/.
  # Consumed by the Next.js proxy at apps/web/src/app/api/graph/solve/route.ts
  # via GRAPH_BACKEND_URL.
  #
  # The app inside the container listens on port 8002 (hardcoded in
  # mindsearch.app). We publish it on host port 7002 to avoid the local 8002
  # collision. Inside the docker network, web reaches it at graph-agent:8002.
  #
  # To enable graph mode in dev:
  #   1. Set in apps/api/.env (or shell):
  #        GRAPH_BACKEND_URL=http://graph-agent:8002      # docker DNS, container port
  #        NEXT_PUBLIC_GRAPH_ENABLED=true
  #        ANTHROPIC_API_KEY=...                          # required by mindsearch
  #   2. Bring up the full stack:
  #        docker compose --profile dev --profile graph up --build
  #
  # When the profile is inactive (default), the rest of the stack continues
  # to work and the Graph toggle is hidden in the UI.
  graph-agent:
    build:
      context: apps/agent_graph_backend
      dockerfile: dockerfile
    container_name: oppmon-graph-agent
    restart: unless-stopped
    profiles:
      - graph
    # mindsearch reads its config from .env via python-dotenv (LLM provider,
    # API keys, search engine, loop limits). env_file pulls the file at deploy
    # time on the host machine and bakes the values into the container env.
    env_file:
      - apps/agent_graph_backend/.env
    ports:
      # Host:Container — mindsearch hardcodes 8002 inside the container.
      - "${GRAPH_AGENT_PORT:-7002}:8002"
    healthcheck:
      # v2_server.py exposes /healthz that returns {"status": "ok", ...}
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8002/healthz\", timeout=3)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - oppmon-network

  # ===========================================================================
  # Prisma Studio - Database GUI (Development only)
  # ===========================================================================
  prisma-studio:
    build:
      context: .
      dockerfile: packages/database/Dockerfile.studio
    container_name: oppmon-prisma-studio
    restart: unless-stopped
    profiles:
      - dev
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-oppmon}:${POSTGRES_PASSWORD:-oppmon_dev_password}@db:5432/${POSTGRES_DB:-oppmon}
    ports:
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oppmon-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  oppmon-documents:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  oppmon-network:
    name: oppmon-network
    driver: bridge
