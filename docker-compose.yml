# =============================================================================
# Arkon Workstation - Docker Compose
# =============================================================================
#
# Usage:
#   pnpm docker:up          # Start all services (db + api + web)
#   pnpm docker:db          # Start database only
#   pnpm docker:down        # Stop all services
#   pnpm docker:logs        # View logs
#
# Profiles:
#   --profile dev           # Development mode with hot reload
#   --profile prod          # Production mode with built images
#   --profile full          # All services including Redis
#
# =============================================================================

services:
  # ===========================================================================
  # Database - PostgreSQL with TimescaleDB
  # ===========================================================================
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: arkon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arkon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arkon_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-arkon}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arkon} -d ${POSTGRES_DB:-arkon}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arkon-network

  # ===========================================================================
  # Redis - Caching and Session Store (optional)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: arkon-redis
    restart: unless-stopped
    profiles:
      - full
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arkon-network

  # ===========================================================================
  # Backend API - Express.js (Development)
  # ===========================================================================
  api-dev:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: arkon-api-dev
    restart: unless-stopped
    profiles:
      - dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-arkon}:${POSTGRES_PASSWORD:-arkon_dev_password}@db:5432/${POSTGRES_DB:-arkon}
      JWT_SECRET: ${JWT_SECRET:-development-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3002}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      # OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-http://localhost:3001/api/auth/github/callback}
      # Redis (when using full profile)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./packages:/app/packages:ro
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - arkon-network

  # ===========================================================================
  # Backend API - Express.js (Production)
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
    container_name: arkon-api
    restart: unless-stopped
    profiles:
      - prod
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FRONTEND_URL: ${FRONTEND_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - arkon-network

  # ===========================================================================
  # Frontend - Next.js (Development)
  # ===========================================================================
  web-dev:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: arkon-web-dev
    restart: unless-stopped
    profiles:
      - dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${FRONTEND_PORT:-3002}:3002"
    volumes:
      - ./apps/web/src:/app/apps/web/src:ro
      - ./apps/web/public:/app/apps/web/public:ro
      - ./packages:/app/packages:ro
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api-dev
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - arkon-network

  # ===========================================================================
  # Frontend - Next.js (Production)
  # ===========================================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: arkon-web
    restart: unless-stopped
    profiles:
      - prod
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_PORT:-3002}:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - arkon-network

  # ===========================================================================
  # Prisma Studio - Database GUI (Development only)
  # ===========================================================================
  prisma-studio:
    build:
      context: .
      dockerfile: packages/database/Dockerfile.studio
    container_name: arkon-prisma-studio
    restart: unless-stopped
    profiles:
      - dev
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-arkon}:${POSTGRES_PASSWORD:-arkon_dev_password}@db:5432/${POSTGRES_DB:-arkon}
    ports:
      - "5555:5555"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - arkon-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  arkon-network:
    name: arkon-network
    driver: bridge
